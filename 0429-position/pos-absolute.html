<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <title>Position absolute 練習</title>
</head>

<body>
    <section class="mt-20 max-w-6xl mx-auto">
        <div class="box outer p-15">
            最外層
            <div class="relative box middle p-20">
                中間層
                <div class="absolute box inner p-15 top-0 right-0">
                    最內層
                </div>
            </div>
        </div>
    </section>
    <section class="mt-10 max-w-6xl mx-auto flex justify-between gap-10">
        <div class="flex flex-col items-center">
            <h2 class="text-2xl font-bold">Position 方法</h2>
            <table>
                <thead>
                    <th>定位方法</th>
                    <th>偏移依據</th>
                    <th>是否有占空間？</th>
                </thead>
                <tbody>
                    <tr>
                        <th>relative</th>
                        <td>自己位置</td>
                        <td>是</td>
                    </tr>

                    <tr>
                        <th>fixed</th>
                        <td>screen</td>
                        <td>否</td>
                    </tr>
                    <tr>
                        <th>sticky</th>
                        <td>自己位置 / screen</td>
                        <td>自己-是 / screen-否</td>
                    </tr>
                    <tr>
                        <th>absolute</th>
                        <td>有 relative 的父層</td>
                        <td>否</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="card relative">
            <img src="../images/chiikawa-movie-hero.png" alt="">
            <h2>title</h2>
            <p>優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息優惠文字訊息</p>
            <div class="sale-tag absolute top-[20px] left-[-4px] bg-red-800 text-white p-2">優惠</div>
            <div class="sale-tag absolute top-0 right-0 bg-red-800 text-white p-2 rounded-bl-lg">6.3折</div>
        </div>
    </section>
</body>

</html>
